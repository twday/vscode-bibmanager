name: Publish Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Validate publish secrets
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "Missing VSCE_PAT secret"
            exit 1
          fi
          if [ -z "${OVSX_PAT}" ]; then
            echo "Missing OVSX_PAT secret"
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Compile
        run: npm run compile

      - name: Prune dev dependencies
        run: |
          npm prune --omit=dev --prefix client
          npm prune --omit=dev --prefix server

      - name: Package extension
        run: npx @vscode/vsce package -o bibmanager.vsix

      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish --packagePath bibmanager.vsix -p "${VSCE_PAT}"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish -p "${OVSX_PAT}" bibmanager.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
